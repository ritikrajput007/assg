<html>
<head>
<title> Registration Form</title>
</head>
<body>
<h2>Registration Form</h2>
<table border="1">
<tr>
<th>Enter your First name</th>
<form>
<td>
<label for="name"></label>
<input type="text" id="name" />
</form>
</td>
</tr>
<tr>
<th>Enter Your last Name</th>
<td>
<form>
<label for="ln"></label>
<input type="text" id="ln" />
</form>
</td>
</tr>
<tr>
<th>Enter your password</th>
<td>
<form>
<label for="pass"></label>
<input type="password" id="pass" />
</form>
</td>
</tr>
<tr>
<th>Re-Enter your Password</th>
<td>
<label for="repass"></label>
<input type="password" id="repass" />
</td>
</tr>
<tr>
<th>Email</th>
<td>
<form>
<label for="mail"></label>
<input type="email" id="mail" />
</form>
</td>
</tr>
<tr>
<th>Enter your mobile number</th>
<td>
<form>
<label for="mbn"></label>
<input type="tel" id="mbn" />
</form>
</td>
</tr>
<tr>
<th>Enter Your Adress</th>
<td>
<label for="adress"></label>
<textarea id="adress" rows="6" cols="5"></textarea>
</td>
</tr>
<tr>
<th>Select your Gender</th>
<td>
<label for="male">Male</label>
<input type="radio" id="male" name="gender" />
<label for="female">Female</label>
<input type="radio" id="female" name="gender" />
</td>
</tr>
<tr>
<th>Select Your Hobbies</th>
<td>
<form>
<label for="h1">Hobby1</label>
<input type="checkbox" id="h1" name="hobby" />
<label for="h2">Hobby2</label>
<input type="checkbox" id="h2" name="hobby" />
<label for="h3">Hobby3</label>
<input type="checkbox" id="h3" name="hobby" />
</form> 
</td>
</tr>
<tr>
<th>Select Your DOB</th>
<td>
<form>
<label for="dob"></label>
<input type="date" id="dob" />
</form>
</td>
</tr>
<tr>
<th>Select Your Country</th>
<td>
<label for="country"></label>
<select id="country">
<option>Select Your country</option>
<option>India</option>
<option>USA</option>
</select>
</td>
</tr>
<tr>
<th>Upload your pic</th>
<td>
<form>
<label for="pic"></label>
<input type="file" id="pic" />
</form>
</td>
</tr>
<tr>
<td colspan="2">
<form>
<input type="submit" value="Submit my Data" />
<input type="reset" value="Reset my Data" />
</form>
</td>
</tr>
</table>
</body>
</html>
