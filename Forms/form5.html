<html>
<head>
<title>Travel Reservation Form</title>
</head>
<body>
<h1>Travel Reservation Form</h1>
<h2>* denotes mandatory</h2>
<form>
<label for="first_name">First Name*:</label><br/>
<input type="text" id="first_name" placeholder="First Name  Last Name" required/><br/>
<label for="email_adress">Email*:</label><br/>
<input type="email" id="email_adress" placeholder="Enter your email here" required /><br/>
<label for="package">Select Tour Package*:</label><br/>
<select id="package" required>
<option>Goa</option>
<option>Himachal</option>
<option>Sri Lanka</option>
</select><br/>
<label for="arr_date">Arrival Date*:</label><br/>
<input type="date" id="arr_date" required /><br/>
<label for="nop">Number of Persons*:</label><br/>
<input type="number" id="nop" required /><br/>
<label for=>What would you want to avail?*</label><br/>
<label for="boarding">Boarding</label>
<input type="checkbox" id="boarding" name="avail" /><br/>
<label for="fooding">Fooding</label>
<input type="checkbox" id="fooding" name="avail" /><br/>
<label for="Sight Seeing">Singht Seeing</label>
<input type="checkbox" id="Sight Seeing" name="avail" /><br/>
<label for="code">Discount Coupon Code:</label><br/>
<input type="text" id="code" pattern="[A-Za-z1-9]" /><br/>
<label>Terms and Conditions</label><br/>
<label for="agree">I agree</label>
<input type="radio" id="agree" name="t_c" />
<label for="dont_agree" >I disagree</label>
<input type="radio" id="dont_agree" name="t_c" /><br/>
<input type="submit" value="Complete Reservation" />
</form>
</body>
</html>
