<html>
<head>
</head>
<body>
<h1>Hotel booking Form</h1>
<form>
<label for="gn">Guest Name</label>
<input type="text" id="gn" /><br/>
<label for="con">Contact</label>
<input type="tel" id="con" /><br/>
<label for="cid">Check In Date</label>
<input type="date" id="cid" /><br/>
<label for="cod">Check Out Date</label>
<input type="date" id="cod" /><br/>
<label for="nog">Number of Guests</label>
<input type="number" id="nog" /><br/>
<label for="tor">Type of Room</label>
<select id="tor">
<option>AC</option>
<option>Non-AC</option>
<option>5 Star</option>
<option>3 Star</option>
</select><br/>
<input type="submit" value="Submit" />
</form>
</body>
</html>
