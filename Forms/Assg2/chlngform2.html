<html>

<body>
<h1>Fitness Tracker Form</h1>
<form>
<label for="date">Date</label>
<input type="date" id="date" /><br/>
<label for="actty">Activity Type</label>
<select id="actty"><br/>
<option>Running</option>
<option>Yoga</option>
<option>Gym</option>
<option>Normal Exercises</option>
</select><br/>
<label for="dur">Duration</label>
<input type="time" step="60" /><br/>
<label for="cb">Calories Burned</label>
<input type="number" id="cb" /><br/>
<input type="submit" />

</form>
</body>
</html>
