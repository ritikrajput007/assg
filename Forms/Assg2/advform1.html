<body>
<h1>E-Commerce Checkout Form</h1>
<form>
<label for="cs">Cart Summary</label>
<input type="text" id="cs" /><br/>
<label for="name">Name</label>
<input type="text" id="name" /><br/>
<label for="mail">Email</label>
<input type="email" id="mail" required /><br/>
<label for="sadd">Shipping Address</label>
<textarea id="sadd" maxlenght="500" rows="7" cols="8"></textarea><br/>
<label>Payment Details</label></br>
<label id="cn">Card Number</label>
<input type="text" id="cn" /><br/>
<label for="ed">Expiry date</label>
<input type="date" id="ed" /><br/>
<label for="cvv">CVV</label>
<input type="text" id="cvv" /><br/>
<input type="submit" />
</form>
