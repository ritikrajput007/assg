<html>
<head>
</head>
<body>
<h1>Medical Appointment Form</h1>
<form>
<label for="pn">Patient Name</label>
<input type="text" id="pn" /><br/>
<label for="cn">Contact Number</label>
<input type="tel" id="cn" /><br/>
<label for="mail">Email</label>
<input type="email" id="mail" /><br/>
<label for="doa">Date of Appointment</label>
<input type="date" id="doa" /><br/>
<label for="ts">Time Slot</label>
<select id="ts">
<option>08:00 to 10:00</option>
<option>11:00 to 02:00</option>
<option>03:00 to 06:00</option>
<option>07:00 to 11:00</option>
</select><br/>
<label for="pd">Preffered Doctor</label>
<select id="pd">
<option>Dr. Mohan PT</option>
<option>Dr. Sandeep</option>
<option>Dr. Arun</option>
<option>Dr. RAmsingh</option>
</select><br/>
<label for="hc">Health Concerns</label>
<textarea id="hc"></textarea><br/>
<input type="submit" value="Submit" />
</form>
</body>
</html>
