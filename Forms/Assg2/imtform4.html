<body>
<h1>Order Form</h1>
<form>
<label for="pn">Product Name</label>
<input type="text" id="pn" /><br/>
<label for="qnt">Quantity</label>
<input type="number" id="qnt" /><br/>
<label for="da">Delivery Address</label>
<textarea id="da"></textarea><br/>
<label>Payment Method</label><br/>
<label for="cc">Credit Card</label>
<input type="radio" id="cc" name="payment" />
<label for="pp">PayPal</label>
<input type="radio" id="pp" name="payment" />
<label for="cod">COD</label>
<input type="radio" id="cod" name="payment" /><br/>
<input type="submit" value="Submit" />
</form>
</body>
</html>
