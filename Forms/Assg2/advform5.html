<html>
<head>
</head>
<body>
<h1>Travel Itinerary Form</h1>
<form>
<label for="tn">Traveler Name</label>
<input type="text" id="tn" /><br/>
<label for="mail">Email</label>
<input type="email" id="mail" required /><br/>
<label for="dest">Destination</label>
<input type="text" id="dest" /><br/>
<label>Travel Dates</label>
<label for="sd">Start Date</label>
<input type="date" id="sd" /><br/>
<label for="ed">End Date</label>
<input type="date" id="ed" /><br/>
<label for="not">Number of Travelers</label>
<input type="number" id="not" /><br/>
<label>Travel Prefences</label><br/>
<label for="flight">Flight</label>
<input type="checkbox" id="flight" name="pref" />
<label for="train">Train</label>
<input type="checkbox" id="train" name="pref" /><br/>
<input type="submit" value="Submit" />
</form>
</body>
</html>
