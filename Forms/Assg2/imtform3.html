html>
<head>
</head>
<body>
<h1>Event Registration Form</h1>
<form>
<label for="name">Full Name</label>
<input type="text" id="name" /><br/>
<label for="mail">Email</label>
<input type="email" id="mail" /><br/>
<label for="et">Event Type</label>
<select id="et">
<option>Birthday Party</option>
<option>Co Operate Parties</option>
<option>Engagemnet</option>
<option>Bachelor Party</option>
</select><br/>
<label for="date">Date selection:</label>
<input type="date" id="date" /><br/>
<label for="ts">Time Slot</label>
<select id="ts">
<option>08:00 to 10:00</option>
<option>11:00 to 02:00</option>
<option>03:00 to 06:00</option>
<option>07:00 to 11:00</option>
</select><br/>
<label for="noa">Number of Attendees</label>
<input type="number" id="noa" /><br/>
<input type="submit" value="Submit" />
</form>
</body>
</html>
