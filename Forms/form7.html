<html>
<head>
<title>My Registration Form</title>
</head>
<body>
<h2>Registration Form</h2>
<form>
<label for="fn">First Name</label>
<input type="text" id="fn" /><br/>
<label for="ln">Last Name</label>
<input type="text" id="ln" /><br/>
<label for="nn">Nick Name</label>
<input type="text" id="nn" /><br/>
<label for="mail">Email</label>
<input type="email" id="mail" /><br/>
<label for="pw">Password</label>
<input type="password" id="pw" /><br/>
<label for="dob">Date of Birth</label>
<input type="date" id="dob" /><br/>
<label>Gender</label><br/>

<input type="radio" id="male" name="gender" />
<label for="male">Male</label>
<input type="radio" id="female" name="gender" />
<label for="female">FeMale</label>
<input type="radio" id="other" name="gender" />
<label for="other">Others</label><br/>
<label for="mob">Mobile</label>
<input type="tel" id="mob" /><br/>
<label for="add">Adress</label>
<textarea id="add"></textarea><br/>
<input type="submit" value="Submit" />
<input type="reset" value="Reset"
</form>
</body>
</html>
