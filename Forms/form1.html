<html>
<head>
<title>Students Registration Form</title>
</head>
<body>
<h3>Student Registration Form</h3>
<p>Fill in the form to register.</p>
<form>
<label for="first_name">First Name</label>
<input type="text" id= "first_name" placeholder="Enter your first name"/><br/>
<label for="last_name">Last Name</label>
<input type="text" id="last_name" placeholder="Enter your last name"/><br/>
<label for="email">E-mail</label>
<input type="email" id="email" placeholder="Enter your e-mail" /><br/>
<label for="date_of_birth">Date of Birth</label>
<input type="date" id="date_of_birth" /><br/>
<label for="username">Set Username</label>
<input type="text" id="username" pattern="[A-Za-z0-9]"placeholder="Set Username" /><br/>
<label for="password">Set Password</label>
<input type="password" id="password" placeholder="Enter Your Password herre"/><br/>
<label for="gender">Gender</label><br/>
<input type="radio" id="gender" name="Gender"/>Male<br/>
<input type="radio" id="gender" name="Gender"/>Female<br/>
<input type="radio" id="gender" name="Gender"/>Others<br/>
<label for="course">Course</label>
<select id="course">
<option>Choose Your Course</option>
<option>Full Stack</option>
<option>Java</option>
<option>Pyhton</option>
<option>Data Analytics</option>
</select>
</form>
</body>
</html>
