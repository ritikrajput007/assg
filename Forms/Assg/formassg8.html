<body>
<h1>Payment Form</h1>
<form autocomplete="off">
<label id="cn">Card Number</label>
<input type="text" id="cn" /><br/>
<label for="ed">Expiry date</label>
<input type="date" id="ed" /><br/>
<label for="cvv">CVV</label>
<input type="text" id="cvv" /><br/>
<label id="noc">Name on Card</label>
<input type="text" id="noc" pattern="[A-Z]" /><br/>
<input type="submit" />

</form>
</body>
</html>
