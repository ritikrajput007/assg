<html>
<head>
</head>
<body>
<h1>Student registration</h1>
<form>
<label for="name">Full Name</label>
<input type="text" id="name" /><br/>
<label for="mail">Email</label>
<input type="email" id="mail" /><br/>
<label for="phn">Phone</label>
<input type="tel" id="phn" /><br/>
<label for="add">Address</label>
<input type="text" id="add" /><br/>
<label>Gender</label><br/>
<label for="male">Male</label>
<input type="radio" id="male" name="gender" />
<label for="female">Female</label>
<input type="radio" id="female" name="gender" />
<label for="oth">Others</label>
<input type="radio" id="oth" name="gender" /><br/>
<label>Hobbies</label><br/>
<label for="h1">Hobby1</label>
<input type="checkbox" id="h1" name="hobby" />
<label for="h2">Hobby2</label>
<input type="checkbox" id="h2" name="hobby" />
<label for="h3">Hobby3</label>
<input type="checkbox" id="h3" name="hobby" /><br/>
<input type="submit" value="Submit" />
</form>
</body>
</html>
