<body>
<h1>Multiple Radio Buttons</h1>
<form>
<label for="name">Name:</label>
<input type="text" id="name" /><br/>
<label>Age Group</label><br/>
<label for="11to20">11 to 20</label>
<input type="radio" id="11to20" name="group" /><br/>
<label for="20to30">20 to 30</label>
<input type="radio" id="20to30" name="group" /><br/>
<label for="30to60">30 to 60</label>
<input type="radio" id="30to60" name="group" /><br/>
<input type="submit" value="Submit" />
</form>
</body>
