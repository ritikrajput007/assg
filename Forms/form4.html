<html>
<head>
<title>Name and Value</title>
</head>
<body>
<table border=""1>
<thead>
<tr>
<th>Name</th>
<th>Value</th>
</tr>
</thead>
<tbody>
<td>Name</td>
<td>
<form>
<label for="name"></label>
<input type="text" id="name"/>
</form>
</td>
<tr>
<td>Sex</td>
<td>
<label for="male">Male</label>
<input type="radio" id="male" name="gender" /><br/>
<label for="female">Female</label>
<input type="radio" id="female" name="gender"/>
</td>
</tr>
<tr>
<td>Eye Color</td>
<td>
<form>
<label for="eye_color"></label>
<select id="eye_color">
<option>Green</option>
<option>Red</option>
<option>Black</option>
</select>
</form>
</td>
</tr>
<tr>
<td>Check all that Apply</td>
<td>
<form>
<label for="checking1">Over 6 feet tall</label>
<input type="checkbox" id="checking1" name="all_that_apply" /><br/>
<label for="checking2">Over 200 Pounds</label>
<input type="checkbox" id="checking2" name="all_that_apply" />
</td>
</tr>
<tr>
<td colspan="2">Describe your athletic ability:<br/>
<form>
<label for="description"></label>
<textarea id="description"></textarea>
</form>
</td>
</tr>
</tbody>
<tfoot>
<tr>
<td colspan="2">
<input type="submit" value="Enter your Information" />
</td>
</tr>
</tfoot>
</table>
</body>
</html>
