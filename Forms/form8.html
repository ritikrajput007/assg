<html>
<head>
<title>User Personal Informaiton</title
</head>
<body>
<h2>User Personal Information</h2>
<form>
<fieldset>
<legend>User Personal Information</legend>
<label for="name">Enter your full name</label><br/>
<input type="text" id="name" /><br/>
<label for="mail">Enter your mail</label><br/>
<input type="email" id="mail" /><br/>
<label for="pw">Enter your Password</label><br/>
<input type="password" id="pw" /><br/>
<label for="pwc">Confirm Your Password</label><br/>
<input type="password" id="pwc" /><br/>
<label>Enter Your Gender</label><br/>
<label for="male">Male</label>
<input type="radio" id="male" name="gender" />
<label for="female">FeMale</label>
<input type="radio" id="female" name="gender" />
<label for="others">Others</label>
<input type="radio" id="others" name="gender" />
<label for="dob">Date of Birth</label><br/>
<input type="date" id="dob" /><br/>
<label for="adress">Enter your Adress</label><br/>
<textarea id="adress"></textarea><br/>
<input type="submit" value="Save" />
</fieldset>
</form>
</body>
</html>
