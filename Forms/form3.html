<html>
<head>
<title>Job Details</title>
</head>
<body>
<h1>Job Details</h1>
<form>
<label for="jt">Job Title:</label>
<input type="text" id="jt" /><br/>
<label for="des">Description:</label>
<textarea id="des" placeholder="Give a brief description about yourslef"></textarea><br/>
<label for="cn">Company Name:</label>
<input type="text" id="cn" /><br/>
<label for="cno">Contact No.:</label>
<input type="tel" id="cno" /><br/>
<label for="cp">Contact Person:</label>
<input type="tel" id="cp" /><br/>
<label for="emil">Email</label>
<input type="email" id="emil" /><br/>
<label>Work:</label>
<input type="checkbox" id="cb_fulltime" name="work"/>
<label for="cb_fulltime">Full Time</label>
<input type="checkbox" id="cb_dimtime" name="work"/>
<label for="cb_fulltime">Dim Time</label>
<input type="checkbox" id="cb_parttime" name="work"/>
<label for="cb_fulltime">Part Time</label>
<input type="checkbox" id="cb_others" name="work"/>
<label for="cb_fulltime">Others</label><br/>
<label for="slry">Salary:</label>
<input type="number" id="slry" />
<select>
<option>US Dollar</option>
<option>INR</option>
<option>Eruos</option>
</select>
<select>
<option>Yearly</option>
<option>Quarterly</option>
<option>Monthly</option>
</select><br/>
<label for="exp">Experience(Years):</label>
<input type="number" id="exp" /><br/>
<label for="loc">Location:</label>
<input type="text" id="loc" /><br/>
<label for="qual">Qualifications</label>
<select>
<option>Any</option>
<option>High School</option>
<option>Pre-School</option>
<option>Associate</option>
</select><br/>
<label for="sbt"></label>
<input type="submit" id="sbt" />
<label for="rst"></label>
<input type="reset" id="rst" />

</form>
</body>
</html>
