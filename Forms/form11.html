<html>
<head>
<title>Student Registration Form</title>
</head>
<body>
<form>
<label for="rn">Roll No:</label>
<input type="text" id="rn" /><br/>
<label>Student Name:</label>
<label for="firn"></label>
<input type="text" id="firn" placeholder="First Name" />
<label for="lstn"></label>
<input type="text" id="lstn" placeholder="Last Name" /><br/>

<label for="f_n">Father's Name:</label>
<input type="text" id="f_n" /><br/>
<label>Date of Birth:</label>
<label for="day"><label>
<input type="day" id="day" placeholder="Day" />
<label for="month"></label>
<input type="Month" id="month" placeholder="month" />
<label for="year"></label>
<input type="year" id="year" placeholder="year" /><br/>
<label for="mobn">Mobile Number:</label>
<input type="tel" id="mobn" /><br/>
<label for="mail">Email:</label>
<input type="email" id="mail" /><br/>
<label for="pas">Password:</label>
<input type="password" id="pas" /><br/>
<label>Gender:</label>
<label for="male">Male</label>
<input type="radio" id="male" name="gender" />
<label for="female">Female</label>
<input type="radio" id="female" name="gender" /><br/>
<label>Department:</label>
<label for="cse">CSE</label>
<input type="checkbox" id="cse" name="dept" />
<label for="it">IT</label>
<input type="checkbox" id="it" name="dept" />
<label for="ece">ECE</label>
<input type="checkbox" id="ece" name="dept" />
<label for="civil">Civil</label>
<input type="checkbox" id="civil" name="dept" />
<label for="mech">Mech</label>
<input type="checkbox" id="mech" name="dept" /><br/>
<label for="course">Course:</label>
<select id="course">
<option>-------------Select Current Course's--------------</option>
<option>B.Tech</option>
<option>M.tech</option>
</select><br/>
<label for="sp">Student Photo:</label>
<input type="file" id="sp" /><br/>
<label for="city">City:</label>
<input type="text" id="city" /><br/>
<label for="add">Address:</label>
<input type="text" id="add" /><br/>
<input type="submit" value="Register" />
</form>
</body>
</html>
