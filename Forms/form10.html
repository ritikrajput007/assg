<html>
<head>
<title>My feedback form</title>
</head>
<body>
<h1>My Feedback Form</h1>
<form>
<ul>
<li>
<form>
<label for="name">Name</label>
<input type="text" id="name" />
</form>
</li>
<li>
<label for="mail">Email</label>
<input type="email" id="mail" />
</li>
<li>
<label for="pas">Password</label>
<input type="password" id="pas" />
</li>
<li>
<label>Please check all the emotions that apply to you</label>
<ul>
<li>
<label for="ang">Angry</label>
<input type="checkbox" id="ang" name="emotions" />
</li>
<li>
<label for="sad">Sad</label>
<input type="checkbox" id="sad" name="emotions" />
</li>
<li>
<label for="hpy">Happy</label>
<input type="checkbox" id="hpy" name="emotions" />
</li>
<li>
<label for="amb">Ambivalent</label>
<input type="checkbox" id="amb" name="emotions" />
</li>
</ul>
</li>
<li>
<label>How satisfied were you with our services</label>
<ul>
<li>
<label for="vs">Very Satisfied</label>
<input type="radio" id="vs" name="level" />
</li>
<li>
<label for="s">Satisfied</label>
<input type="radio" id="s" name="level" />
</li>
<li>
<label for="dc">Didn't Care</label>
<input type="radio" id="dc" name="level" />
</li>
<li>
<label for="ds">Dissatisfied</label>
<input type="radio" id="ds" name="level" />
</li>
<li>
<label for="vd">Very Dissatisfied</label>
<input type="radio" id="vd" name="level" />
</li>
</ul>
<li>
<label for="further_components">Further Components</label>
<input type="text" id="further_components" />
</li>
<li>
<label for="bp">Bio Photo</label>
<input type="file" id="bp" />
</li>
<li>
<label for="location">Location Visited</label>
<select id="location">
<option>Select location</option>
<option>Goa</option>
<option>Haryana</option>
</select>
</li>
<li>
<input type="submit" value="submit" />
</li>
</ul>
<form>
</body>
</html>
