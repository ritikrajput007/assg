<html>
<head>
<title>Unordered list Bullet Points</title>
</head>
<body>
<h3>Example of unordered list in circle</h3>
<ul type="circle">
<li>Sachin</li>
<li>Manoj</li>
</ul>

<h3>Example of unordered disk in disc</h3>
<ul type="disc">
<li>Priya</li>
<li>Mohit</li>
</ul>

<h3>Example of unordered disk in square</h3>
<ul type="square">
<li>Pinky</li>
<li>Poonam</li>
</ul>

<h3>Example of unordered disk in none</h3>
<ul type="none">
<li>Mukti</li>
<li>Dhama</li>
</ul>
</body>
</html>
