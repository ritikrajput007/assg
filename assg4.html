<h2>NESTED LISTS EXAMPLE</h2>

<ol type="a">
<li>Animals</li>
<ul type="square">
<li>Mammals</li>
<ol type="a">
<li>Lion</li>
<li>Elephant</li>
<li>Whale</li>
</ol>
</ul>
<ul type="square">
<li>Reptiles</li>
<ul>
<li>Snake</li>
<li>Turtle</li>
<li>Crocodile</li>
</ul>
</ul>
<li>Plants</li>
<ul type="square">
<li>Flowering</li>
<ol type="a">
<li>Rose</li>
<li>Tulip</li>
<li>SunFlower</li>
</ol>
<li>Non-Flowering</li>
<ul type="square">
<li>Fern</li>
<li>Moss</li>
<li>Algae</li>
</ul>
</ul>
</ol>
</body>
</html>
